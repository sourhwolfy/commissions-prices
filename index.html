<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #090b10;
    --bg-card:   #0e1018;
    --bg-raised: #13161f;
    --gold:      #d4af37;
    --gold-light: #e8c060;
    --blue:      #7db1e8;
    --text:      #d4cfc4;
    --text-dim:  #8a91a0;
    --line-gold: rgba(201,168,76,0.18);
    --line-blue: rgba(91,142,194,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh;
    overflow-x: hidden;
    transition: opacity 0.18s ease;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 100; opacity: 0.45;
  }

  /* LANGUAGE TOGGLE */
  .lang-toggle {
    position: fixed; top: 20px; right: 24px;
    z-index: 10000; display: flex; align-items: center;
    border: 1px solid var(--line-gold); overflow: hidden; background: var(--bg-card);
  }
  .lang-btn {
    font-family: 'Space Mono', monospace;
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    padding: 9px 14px; cursor: pointer; border: none;
    background: transparent; color: var(--text-dim);
    transition: background 0.2s, color 0.2s;
  }
  .lang-btn.active { background: rgba(201,168,76,0.12); color: var(--gold); }
  .lang-btn:not(.active):hover { background: rgba(255,255,255,0.04); color: var(--text); }
  .lang-divider { width: 1px; height: 16px; background: var(--line-gold); flex-shrink: 0; }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--line-gold);
    position: relative; overflow: hidden;
  }
  .header-inner {
    margin: 0 auto;
    position: relative; z-index: 1;
  }
  header::before {
    content: ''; position: absolute;
    top: -120px; right: -120px; width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 65%);
    pointer-events: none;
  }
  header::after {
    content: 'COMM'; position: absolute;
    right: -20px; bottom: -40px;
    font-size: 180px; font-weight: 700; color: var(--gold);
    opacity: 0.03; line-height: 1; pointer-events: none; letter-spacing: -8px;
  }
  .header-tag { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 5px; text-transform: uppercase; color: var(--blue); margin-bottom: 20px; }
  .header-name { font-size: clamp(38px, 7vw, 130px); font-weight: 600; letter-spacing: -3px; line-height: 0.95; color: #ece6da; margin-bottom: 6px; }
  .header-name span { color: var(--gold); font-style: italic; }
  .header-sub { font-size: 15px; color: var(--text-dim); font-style: italic; margin-top: 20px; max-width: 440px; line-height: 1.6; }
  .header-aviso {
    display: inline-flex; align-items: center; gap: 8px;
    margin-top: 28px; padding: 10px 18px;
    border: 1px solid var(--line-gold); background: rgba(201,168,76,0.05);
    font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; color: var(--gold);
  }
  .header-aviso::before { content: '◆'; font-size: 8px; }
  .header-aviso-link {
    color: var(--gold); text-decoration: none;
    font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px;
    transition: color 0.2s; text-transform: uppercase;
  }
  .header-aviso-link:hover { color: var(--gold-light); text-decoration: underline; }
  .header-aviso-sep { color: var(--gold); opacity: 0.4; font-size: 10px; }

  .wrapper { margin: 0 auto; }
  .secao { padding: 56px 0; border-bottom: 1px solid var(--line-blue); }
  .secao-label {
    font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 4px;
    text-transform: uppercase; color: var(--text-dim); margin-bottom: 32px;
    display: flex; align-items: center; gap: 16px;
  }
  .secao-label::after { content: ''; flex: 1; height: 1px; background: var(--line-blue); }

  /* SKETCH CARDS */
  .rascunhos-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 1px; background: var(--line-gold); border: 1px solid var(--line-gold);
  }
  .tipo-card { background: var(--bg-card); position: relative; overflow: hidden; transition: background 0.25s; }
  .tipo-card:hover { background: var(--bg-raised); }

  .card-img {
    width: 100%;
    background: var(--bg-raised);
    border-bottom: 1px solid var(--line-gold); overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .card-img img { width: 100%; height: auto; max-height: clamp(260px, 32vw, 520px); object-fit: contain; object-position: center; transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); display: block; padding: 16px; }
  .tipo-card:hover .card-img img { transform: scale(1.03); }

  /* CARROSSEL */
  .carousel { position: relative; width: 100%; }
  .card-img.carousel { min-height: clamp(200px, 22vw, 420px); height: clamp(200px, 22vw, 420px); }
  .card-img.carousel .carousel-track { min-height: unset; height: 100%; }
  .carousel-track {
    position: relative; width: 100%; overflow: hidden;
    background: var(--bg-raised);
    border-bottom: 1px solid var(--line-gold);
  }
  .chapadas-img .carousel-track { border-bottom: none; border-right: 1px solid var(--line-blue); height: 100%; }
  .destaque-img .carousel-track { border-bottom: none; border-right: 1px solid var(--line-gold); height: 100%; }

  .carousel-slide {
    position: absolute; inset: 0; width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
  }
  .carousel-slide img {
    width: 100%; height: auto; max-height: clamp(260px, 32vw, 520px);
    object-fit: contain; object-position: center;
    display: block; padding: 16px; cursor: zoom-in;
  }
  .chapadas-img .carousel-slide img,
  .destaque-img .carousel-slide img { width: 100%; height: 100%; object-fit: contain; padding: 16px; }

  .carousel-btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    z-index: 10; width: clamp(28px, 3vw, 36px); height: clamp(28px, 3vw, 36px);
    background: rgba(9, 11, 16, 0.75); border: 1px solid var(--line-gold);
    color: var(--gold); cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 13px; line-height: 1;
    opacity: 0; transition: opacity 0.2s, background 0.2s;
    backdrop-filter: blur(4px); -webkit-tap-highlight-color: transparent;
  }
  .carousel:hover .carousel-btn,
  .carousel-btn:focus { opacity: 1; }
  @media (hover: none) { .carousel-btn { opacity: 0.75; } }
  .carousel-btn:hover { background: rgba(201,168,76,0.15); }
  .carousel-btn.prev { left: 6px; }
  .carousel-btn.next { right: 6px; }

  .carousel-dots {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 5px; z-index: 10;
  }
  .carousel-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--text-dim); opacity: 0.4;
    transition: opacity 0.2s, background 0.2s;
    cursor: pointer; border: none; padding: 0;
  }
  .carousel-dot.active { background: var(--gold); opacity: 1; }


  .card-img-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; gap: 10px; color: var(--text-dim); }
  .card-img-placeholder .icon { font-size: 32px; opacity: 0.3; }
  .card-img-placeholder span { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.4; }

  .card-body { padding: 24px 28px 28px; }
  .card-tipo { font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: var(--blue); margin-bottom: 8px; }
  .card-nome { font-size: 22px; font-weight: 600; color: #e8e0d0; margin-bottom: 4px; line-height: 1.2; }
  .card-desc { font-size: 15px; color: var(--text-dim); line-height: 1.5; margin-bottom: 20px; font-style: italic; min-height: 45px; }
  .card-preco { display: flex; align-items: baseline; gap: 4px; }
  .preco-symbol { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--gold); opacity: 0.7; }
  .preco-num { font-size: 40px; font-weight: 600; color: var(--gold); line-height: 1; letter-spacing: -1px; }

  /* CHAPADAS */
  .chapadas-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--line-blue); border: 1px solid var(--line-blue); }
  .chapadas-card { background: var(--bg-card); display: grid; grid-template-columns: 1fr 1fr; transition: background 0.2s; }
  .chapadas-card:hover { background: var(--bg-raised); }

  .chapadas-img {
    aspect-ratio: 3/4;
    max-height: 420px;
    background: var(--bg-raised); border-right: 1px solid var(--line-blue); overflow: hidden;
  }
  .chapadas-img img { width: 100%; height: 100%; object-fit: contain; object-position: center; opacity: 0.9; transition: opacity 0.3s; display: block; padding: 12px; }
  .chapadas-card:hover .chapadas-img img { opacity: 1; }

  .chapadas-body { padding: 28px; display: flex; flex-direction: column; justify-content: space-between; }
  .chapadas-tipo { font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: var(--blue); margin-bottom: 10px; }
  .chapadas-nome { font-size: 20px; font-weight: 600; color: #e8e0d0; margin-bottom: 8px; line-height: 1.3; }
  .chapadas-desc { font-size: 15px; color: var(--text-dim); font-style: italic; line-height: 1.5; }
  .chapadas-preco { display: flex; align-items: baseline; gap: 4px; margin-top: 20px; flex-wrap: wrap; }
  .chapadas-preco .preco-num { font-size: 32px; }

  /* DESTAQUE */
  .destaque-section { padding: 56px 0; border-bottom: 1px solid var(--line-gold); }
  .destaque-cards-stack { display: flex; flex-direction: column; gap: 1px; }

  /* Placeholder "em breve" */
  .destaque-placeholder {
    aspect-ratio: 3/4;
    max-height: clamp(260px, 35vw, 620px);
    background: rgba(0,0,0,0.3); border-right: 1px solid var(--line-gold);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; overflow: hidden; position: relative;
  }
  .destaque-placeholder::before {
    content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(
      -45deg,
      transparent, transparent 18px,
      rgba(201,168,76,0.025) 18px, rgba(201,168,76,0.025) 19px
    );
  }
  .placeholder-icon  { font-size: clamp(28px, 3vw, 40px); opacity: 0.2; position: relative; z-index: 1; }
  .placeholder-label {
    font-family: 'Space Mono', monospace;
    font-size: clamp(8px, 0.7vw, 10px); letter-spacing: 4px; text-transform: uppercase;
    color: var(--gold); opacity: 0.35; position: relative; z-index: 1;
    text-align: center; padding: 0 20px;
  }
  .destaque-card {
    background: linear-gradient(135deg, #0d1420 0%, #090e18 100%);
    border: 1px solid var(--line-gold);
    display: grid; grid-template-columns: 1fr 1.2fr;
    overflow: hidden; position: relative;
  }
  .destaque-card::before { content: ''; position: absolute; top: -100px; right: -100px; width: 400px; height: 400px; background: radial-gradient(circle, rgba(201,168,76,0.07) 0%, transparent 65%); pointer-events: none; }

  .destaque-img {
    aspect-ratio: 3/4;
    max-height: 480px;
    background: rgba(0,0,0,0.3); border-right: 1px solid var(--line-gold); overflow: hidden;
  }
  .destaque-img img { width: 100%; height: 100%; object-fit: contain; object-position: center; opacity: 0.9; display: block; padding: 16px; }

  .destaque-body { padding: 48px 40px; display: flex; flex-direction: column; justify-content: space-between; position: relative; z-index: 1; }
  .destaque-tag { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; }
  .destaque-nome { font-size: clamp(24px, 3.2vw, 56px); font-weight: 600; color: var(--gold-light); line-height: 1.15; margin-bottom: 16px; }
  .destaque-desc { font-size: 16px; color: var(--text); font-style: italic; line-height: 1.7; margin-bottom: 32px; max-width: 360px; }
  .destaque-precos { display: flex; flex-direction: column; gap: 1px; border: 1px solid var(--line-gold); }
  .destaque-preco-linha { display: flex; justify-content: space-between; align-items: center; padding: 14px 20px; background: rgba(0,0,0,0.3); transition: background 0.2s; gap: 12px; }
  .destaque-preco-linha:hover { background: rgba(201,168,76,0.06); }
  .destaque-preco-tipo { font-size: 15px; color: var(--text); }
  .destaque-preco-val { font-family: 'Space Mono', monospace; font-size: 18px; font-weight: 700; color: var(--gold); white-space: nowrap; }

  /* ADICIONAIS */
  .adicionais-section { padding: 56px 0; border-bottom: 1px solid var(--line-blue); }
  .adicionais-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; background: var(--line-blue); border: 1px solid var(--line-blue); }
  .adicional { background: var(--bg-card); padding: 28px; transition: background 0.2s; }
  .adicional:hover { background: var(--bg-raised); }
  .adicional-icon { font-size: 24px; margin-bottom: 14px; opacity: 0.6; }
  .adicional-nome { font-size: 17px; font-weight: 600; color: #e0d8c8; margin-bottom: 6px; }
  .adicional-desc { font-size: 15px; color: var(--text-dim); font-style: italic; line-height: 1.5; margin-bottom: 16px; }
  .adicional-val { font-family: 'Space Mono', monospace; font-size: 20px; color: var(--gold); }

  /* TERMOS */
  .termos-section { padding: 48px 0 64px; }
  .termos-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--line-gold); border: 1px solid var(--line-gold); }
  .termo { background: var(--bg-card); padding: 24px 20px; }
  .termo-titulo { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--blue); margin-bottom: 10px; }
  .termo-desc { font-size: 13px; color: var(--text-dim); line-height: 1.6; font-style: italic; }

  /* FOOTER */
  .page-footer {
    padding: 36px 56px;
    border-top: 1px solid var(--line-gold);
    display: flex; justify-content: space-between; align-items: center;
    gap: 24px; flex-wrap: wrap;
  }
  .footer-handle { font-family: 'Space Mono', monospace; font-size: 14px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-dim); }
  .footer-social { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .social-link {
    display: inline-flex; align-items: center; gap: 7px;
    font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-dim); text-decoration: none;
    padding: 8px 12px; border: 1px solid transparent;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
  }
  .social-link:hover { color: var(--gold); border-color: var(--line-gold); background: rgba(201,168,76,0.05); }
  .social-icon { width: 14px; height: 14px; flex-shrink: 0; opacity: 0.7; }
  .social-link:hover .social-icon { opacity: 1; }
  .social-icon-text {
    width: 14px; height: 14px; flex-shrink: 0;
    font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700;
    color: currentColor; opacity: 0.7; line-height: 14px; text-align: center;
  }
  .social-link:hover .social-icon-text { opacity: 1; }

  /* ═══════════════════════════════════════════
     SISTEMA RESPONSIVO FLUIDO
     Tudo usa clamp() — sem saltos entre breakpoints
     ═══════════════════════════════════════════ */

  /* Wrapper fluido: padding lateral escala com a tela */
  .wrapper {
    max-width: 100%;
    padding-left:  clamp(16px, 5vw, 80px);
    padding-right: clamp(16px, 5vw, 80px);
  }
  .header-inner {
    max-width: 100%;
    padding: clamp(40px, 6vw, 72px) clamp(16px, 5vw, 80px) clamp(32px, 4vw, 56px);
  }
  .page-footer {
    padding: clamp(24px, 3vw, 40px) clamp(16px, 5vw, 80px);
  }

  /* Header — título escala do mobile ao ultrawide */
  .header-sub   { font-size: clamp(13px, 1.1vw, 18px); max-width: clamp(300px, 38vw, 600px); }

  /* Seções */
  .secao        { padding: clamp(36px, 5vw, 72px) 0; }
  .destaque-section,
  .adicionais-section { padding: clamp(36px, 5vw, 72px) 0; }
  .termos-section     { padding: clamp(32px, 4vw, 64px) 0 clamp(48px, 6vw, 80px); }
  .secao-label { margin-bottom: clamp(20px, 2.5vw, 40px); font-size: clamp(8px, 0.65vw, 11px); }

  /* Cards de rascunho — sempre 3 colunas alinhadas */
  .rascunhos-grid { grid-template-columns: repeat(3, 1fr); }
  .card-img { min-height: clamp(200px, 22vw, 420px); }
  .card-img img { max-height: clamp(200px, 22vw, 420px); }
  .card-img.carousel { min-height: clamp(200px, 22vw, 420px); }
  .card-body      { padding: clamp(16px, 1.8vw, 32px) clamp(18px, 2vw, 36px) clamp(20px, 2.2vw, 36px); }
  .card-nome      { font-size: clamp(18px, 1.6vw, 28px); }
  .card-desc      { font-size: clamp(13px, 1vw, 16px); }
  .preco-num      { font-size: clamp(32px, 3vw, 52px); }
  .preco-symbol   { font-size: clamp(10px, 0.9vw, 14px); }

  /* Chapadas */
  .chapadas-grid  { grid-template-columns: repeat(auto-fit, minmax(min(340px, 100%), 1fr)); }
  .chapadas-img   { max-height: clamp(240px, 30vw, 560px); }
  .chapadas-body  { padding: clamp(20px, 2vw, 40px); }
  .chapadas-nome  { font-size: clamp(17px, 1.5vw, 26px); }
  .chapadas-desc  { font-size: clamp(13px, 1vw, 16px); }
  .chapadas-preco .preco-num { font-size: clamp(26px, 2.5vw, 42px); }

  /* Destaque */
  .destaque-img   { max-height: clamp(260px, 35vw, 620px); }
  .destaque-body  { padding: clamp(28px, 3.5vw, 64px) clamp(24px, 3vw, 56px); }
  .destaque-desc  { font-size: clamp(13px, 1.1vw, 18px); max-width: clamp(260px, 32vw, 520px); }
  .destaque-preco-tipo { font-size: clamp(13px, 1.1vw, 18px); }
  .destaque-preco-val  { font-size: clamp(14px, 1.4vw, 22px); }
  .destaque-preco-linha { padding: clamp(10px, 1vw, 18px) clamp(12px, 1.5vw, 24px); }

  /* Adicionais */
  .adicionais-grid { grid-template-columns: repeat(auto-fit, minmax(min(280px, 100%), 1fr)); }
  .adicional      { padding: clamp(20px, 2.2vw, 40px); }
  .adicional-nome { font-size: clamp(15px, 1.3vw, 22px); }
  .adicional-desc { font-size: clamp(13px, 1vw, 16px); }
  .adicional-val  { font-size: clamp(16px, 1.5vw, 24px); }

  /* Termos */
  .termos-grid { grid-template-columns: repeat(auto-fit, minmax(min(200px, 100%), 1fr)); }
  .termo      { padding: clamp(18px, 1.8vw, 32px) clamp(16px, 1.5vw, 28px); }
  .termo-desc { font-size: clamp(12px, 0.9vw, 15px); }

  /* Footer social */
  .footer-handle { font-size: clamp(10px, 0.9vw, 14px); }
  .social-link   { font-size: clamp(8px, 0.7vw, 11px); padding: clamp(6px, 0.6vw, 10px) clamp(8px, 0.9vw, 14px); }

  /* ── Breakpoints apenas para mudanças estruturais de layout ── */

  /* Tablet: chapadas e destaque empilham */
  @media (max-width: 860px) {
    .chapadas-card { grid-template-columns: 1fr; }
    .chapadas-img  { aspect-ratio: 4/3; border-right: none; border-bottom: 1px solid var(--line-blue); }
    .destaque-card { grid-template-columns: 1fr; }
    .destaque-img  { aspect-ratio: 4/3; }
    .page-footer   { flex-direction: column; gap: 14px; text-align: center; align-items: center; }
    .footer-social { justify-content: center; }
  }

  /* Mobile: rascunhos 1 coluna, lang toggle menor */
  @media (max-width: 520px) {
    .lang-toggle { top: 14px; right: 14px; }

<script>
  let currentLang = 'pt';

  function setLang(lang) {
    if (lang === currentLang) return;
    currentLang = lang;
    document.getElementById('btn-pt').classList.toggle('active', lang === 'pt');
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    document.documentElement.lang = lang === 'pt' ? 'pt-BR' : 'en';
    document.title = lang === 'pt' ? 'Comissões — sourhwolfy' : 'Commissions — sourhwolfy';
    document.body.style.opacity = '0';
    setTimeout(() => {
      document.querySelectorAll('[data-pt]').forEach(el => {
        el.innerHTML = el.getAttribute('data-' + lang);
      });
      document.body.style.opacity = '1';
    }, 180);
  }

  // Init PT
  document.querySelectorAll('[data-pt]').forEach(el => {
    el.innerHTML = el.getAttribute('data-pt');
  });
</script>

    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: #8a91a0; cursor: pointer;
    padding: 8px 12px; border: 1px solid rgba(201,168,76,0.18);
    background: #0e1018; transition: color 0.2s, border-color 0.2s;
  }
  .zoom-close:hover { color: #d4af37; border-color: #d4af37; }
  .zoom-hint {
    position: absolute; bottom: 24px;
    font-family: "Space Mono", monospace;
    font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
    color: #8a91a0; opacity: 0.5;
  }
  .card-img img, .chapadas-img img, .destaque-img img { cursor: zoom-in; }
</style>

<div class="zoom-overlay" id="zoomOverlay" onclick="closeZoom()">
  <div class="zoom-close" onclick="closeZoom()">ESC · fechar / close</div>
  <img id="zoomImg" src="" alt="">
  <div class="zoom-hint">clique em qualquer lugar ou ESC para fechar</div>
</div>

<script>
  // ── CARROSSEL ──
  function initCarousels() {
    document.querySelectorAll('[data-carousel]').forEach(carousel => {
      const track   = carousel.querySelector('.carousel-track');
      const slides  = Array.from(carousel.querySelectorAll('.carousel-slide'));
      const prevBtn = carousel.querySelector('.carousel-btn.prev');
      const nextBtn = carousel.querySelector('.carousel-btn.next');
      const dotsEl  = carousel.querySelector('.carousel-dots');
      if (!slides.length) return;

      let current = 0;

      // Build dots
      dotsEl.innerHTML = '';
      slides.forEach((_, i) => {
        const d = document.createElement('button');
        d.className = 'carousel-dot' + (i === 0 ? ' active' : '');
        d.addEventListener('click', e => { e.stopPropagation(); goTo(i); });
        dotsEl.appendChild(d);
      });
      const dots = Array.from(dotsEl.querySelectorAll('.carousel-dot'));

      // For chapadas/destaque: aspect-ratio drives height, absolute slides work fine
      // For card-img (rascunhos): no aspect-ratio, so we measure the natural image heights
      const isCardImg = carousel.classList.contains('card-img');

      function setTrackHeight() {
        if (!isCardImg) return;
        // Temporarily show all slides to measure
        slides.forEach(s => { s.style.visibility = 'hidden'; s.style.transform = 'translateX(0)'; });
        let maxH = 0;
        slides.forEach(s => {
          const img = s.querySelector('img');
          if (img) maxH = Math.max(maxH, img.offsetHeight || img.naturalHeight * (s.offsetWidth / (img.naturalWidth || 1)));
        });
        if (maxH > 60) track.style.height = maxH + 'px';
        // Restore
        slides.forEach((s, i) => {
          s.style.visibility = '';
          s.style.transform = `translateX(${(i - current) * 100}%)`;
        });
      }

      // Init positions
      slides.forEach((s, i) => { s.style.transform = `translateX(${i * 100}%)`; });

      // Wait for images to load then set height
      if (isCardImg) {
        const imgs = Array.from(carousel.querySelectorAll('img'));
        let loaded = 0;
        function onLoad() {
          loaded++;
          if (loaded >= imgs.length) setTrackHeight();
        }
        imgs.forEach(img => {
          if (img.complete) onLoad();
          else { img.addEventListener('load', onLoad); img.addEventListener('error', onLoad); }
        });
        // Also set on resize
        window.addEventListener('resize', () => { setTimeout(setTrackHeight, 50); });
      }

      function goTo(idx) {
        current = ((idx % slides.length) + slides.length) % slides.length;
        slides.forEach((s, i) => {
          s.style.transform = `translateX(${(i - current) * 100}%)`;
        });
        dots.forEach((d, i) => d.classList.toggle('active', i === current));
        if (isCardImg) setTimeout(setTrackHeight, 420); // after transition
      }

      prevBtn.addEventListener('click', e => { e.stopPropagation(); goTo(current - 1); });
      nextBtn.addEventListener('click', e => { e.stopPropagation(); goTo(current + 1); });

      // Swipe support
      let startX = 0;
      track.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
      track.addEventListener('touchend',   e => {
        const dx = e.changedTouches[0].clientX - startX;
        if (Math.abs(dx) > 40) goTo(current + (dx < 0 ? 1 : -1));
      }, { passive: true });
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initCarousels);
  } else {
    initCarousels();
  }
</script>

<script>
  const overlay = document.getElementById("zoomOverlay");
  const zoomImg = document.getElementById("zoomImg");

  function openZoom(src, alt) {
    zoomImg.src = src;
    zoomImg.alt = alt || "";
    overlay.classList.add("active");
    document.body.style.overflow = "hidden";
  }

  function closeZoom() {
    overlay.classList.remove("active");
    document.body.style.overflow = "";
    setTimeout(() => { zoomImg.src = ""; }, 300);
  }

  function attachZoomListeners() {
    document.querySelectorAll(".carousel-slide img, .card-img img, .chapadas-img img, .destaque-img img").forEach(img => {
      img.removeEventListener("click", img._zoomHandler);
      img.removeEventListener("touchstart", img._zoomTouchHandler);

      img._zoomHandler = (e) => {
        e.preventDefault();
        e.stopPropagation();
        openZoom(img.src, img.alt);
      };

      // Use touchstart + stopPropagation to beat overlay's touchend
      img._zoomTouchHandler = (e) => {
        e.stopPropagation();
        // mark touch so overlay knows not to close
        overlay._openedByTouch = true;
        openZoom(img.src, img.alt);
        setTimeout(() => { overlay._openedByTouch = false; }, 350);
      };

      img.addEventListener("click", img._zoomHandler);
      img.addEventListener("touchstart", img._zoomTouchHandler, { passive: true });
    });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", attachZoomListeners);
  } else {
    attachZoomListeners();
  }

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeZoom();
  });

  overlay.addEventListener("click", (e) => {
    if (e.target === overlay || e.target.classList.contains("zoom-hint") || e.target.classList.contains("zoom-close")) {
      closeZoom();
    }
  });

  overlay.addEventListener("touchend", (e) => {
    if (overlay._openedByTouch) return; // just opened, ignore
    if (e.target === overlay || e.target.classList.contains("zoom-hint") || e.target.classList.contains("zoom-close")) {
      closeZoom();
    }
  }, { passive: true });
</script>

</body>
